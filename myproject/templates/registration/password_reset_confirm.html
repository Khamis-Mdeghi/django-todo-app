<!DOCTYPE html>
<html>
<head>
    <title>Enter New Password</title>
</head>
<body>
    <h1>Enter New Password</h1>

    {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Set New Password</button>
        </form>
    {% else %}
        <p style="color:red">❌ This link is invalid or already used!</p>
        <a href="{% url 'password_reset' %}">Request a new reset link</a>
    {% endif %}

</body>
</html>
